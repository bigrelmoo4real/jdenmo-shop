<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - JDENMO SHOP</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="shortcut icon" href="logo.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #27AE60, #FF6B35);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #27AE60;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #4a5d8a;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #153269;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #d1d9f5;
            border-radius: 12px;
            font-size: 0.95rem;
            color: #192a4d;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #27AE60;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #27AE60, #FF6B35);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #FF6B35;
            font-size: 0.9rem;
            margin-top: 10px;
            padding: 12px;
            background: #ffe0e0;
            border-radius: 8px;
            display: none;
        }

        .success-message {
            color: #2cae5e;
            font-size: 0.9rem;
            margin-top: 10px;
            padding: 12px;
            background: #e0ffe0;
            border-radius: 8px;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
        }

        .spinner {
            border: 3px solid #f0f0f0;
            border-top: 3px solid #27AE60;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <h1>JDENMO SHOP</h1>
        <p>Espace d'administration</p>
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label for="username">Identifiant</label>
            <input type="text" id="username" required placeholder="admin">
        </div>

        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>

        <button type="submit" class="login-btn">Se connecter</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
    </form>
</div>

<script>
    const loginForm = document.getElementById("loginForm");
    const errorMessage = document.getElementById("errorMessage");
    const successMessage = document.getElementById("successMessage");
    const loading = document.getElementById("loading");

    loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        errorMessage.style.display = "none";
        successMessage.style.display = "none";
        loading.style.display = "block";

        try {
            const response = await fetch("https://jdenmo-shop.onrender.com/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            loading.style.display = "none";

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem("jdenmo_token", data.token);
                successMessage.textContent = "✅ Connexion réussie, redirection...";
                successMessage.style.display = "block";
                setTimeout(() => {
                    window.location.href = "https://jdenmo-shop.onrender.com/admin.html";
                }, 1500);
            } else {
                const error = await response.json();
                errorMessage.textContent = "❌ " + error.error;
                errorMessage.style.display = "block";
            }
        } catch (error) {
            loading.style.display = "none";
            errorMessage.textContent = "❌ Erreur de connexion au serveur. Assurez-vous que le serveur est lancé (npm start).";
            errorMessage.style.display = "block";
        }
    });
</script>
</body>
</html>
